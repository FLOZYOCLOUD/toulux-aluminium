<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Toulux™</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Header/Back Button -->
    <header class="max-w-6xl mx-auto px-6 py-10">
        <a href="index.html" class="text-gray-600 hover:text-gray-900 flex items-center font-medium">
            &larr; Back to Home
        </a>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        
        <!-- Section: Accessoires (50 items example) -->
        <section class="mb-20">
            <h2 class="text-3xl font-bold mb-10 text-gray-900 border-l-4 border-gray-900 pl-4">Hardware & Accessoires</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- Repeat this block 50 times -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="w-full h-32 bg-gray-200 rounded-lg mb-3"></div> <!-- Image Placeholder -->
                    <p class="text-sm font-medium text-gray-800 text-center">Accessory Name</p>
                </div>
            </div>
        </section>

        <!-- Section: Profiles (20 items example) -->
        <section class="mb-20">
            <h2 class="text-3xl font-bold mb-10 text-gray-900 border-l-4 border-gray-900 pl-4">Insulating Profiles</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- Repeat this block 20 times -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="w-full h-32 bg-gray-200 rounded-lg mb-3"></div>
                    <p class="text-sm font-medium text-gray-800 text-center">Profile Model</p>
                </div>
            </div>
        </section>

        <!-- Section: Panels (5 items example) -->
        <section class="mb-20">
            <h2 class="text-3xl font-bold mb-10 text-gray-900 border-l-4 border-gray-900 pl-4">Composite Panels</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                <!-- Repeat this block 5 times -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="w-full h-32 bg-gray-200 rounded-lg mb-3"></div>
                    <p class="text-sm font-medium text-gray-800 text-center">Panel Type</p>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
